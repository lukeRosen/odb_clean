eoResumeSeriesLabel" :null ,"videoEpisodesLabel" :null ,"videoAllSeasonsLabel" :null ,"videoRelatedLabel" :null ,"videoMoreLabel" :null ,"videoRemoveLabel" :null ,"videoSeasonLabel" :null ,"videoSeasonsLabel" :null ,"videoNoEpisodesMessage" :null ,"videoContinueWatchingLabel" :null ,"videoRecommendedForYouLabel" :null ,"videoYouMayAlsoLikeLabel" :null ,"videoTrendingNowLabel" :null ,"videoSeriesLabel" :null ,"videoPodcastsLabel" :null ,"videoLatestPodcastEpisodesLabel" :null ,"videoDailyDevotionalsLabel" :null ,"videoThemesAndCategoriesLabel" :null ,"videoNewLabel" :null ,"videoDaysToDisplayAsNew" :null ,"videoMediaFailedToLoad" :null ,"videoUnsupportedFormatBrowser" :null ,"videoAutoplayBlocked" :null ,"platformAmazonMusic" :null ,"platformAnghami" :null ,"platformApplePodcasts" :null ,"platformCastbox" :null ,"platformCastro" :null ,"platformCeezer" :null ,"platformFountain" :null ,"platformGaana" :null ,"platformGoodpods" :null ,"platformIHeartRadio" :null ,"platformJiosaavn" :null ,"platformMetacast" :null ,"platformOvercast" :null ,"platformPandora" :null ,"platformPocketCasts" :null ,"platformSoundcloud" :null ,"platformSpotify" :null ,"platformTuneIn" :null ,"odbxLanguageCode" :"zh-TW" ,"transistorEpisodeEditorialUtcOffsetHours" :8.0 ,"countryOverride" :null ,"skuListname" :"EZT100" ,"isLanguageSiteMigrated" :fals e} ,"pageModel" : {"pageTitle" :"慷慨給予" ,"devotionalDate" :"2026年6月1日" ,"devotionalDateIso" :"2026-06-01" ,"bibleVerseText" :"申命記14章23-29節" ,"bibleVerseLink" : {"ariaLabel" :"申命記14章23-29節" ,"text" :"申命記14章23-29節" ,"title" :"申命記14章23-29節" ,"href" :"https://www.biblegateway.com/passage/?search=%E7%94%B3%E5%91%BD%E8%A8%9814:23-29&version=CUVMPT" ,"target" :"Open in a new tab or window" ,"isExternal" :tru e} ,"devotionBody" :"<p>在1911到1915年間，章伯斯與妻子比迪在倫敦開辦聖經學院，他們始終秉持一個人生原則，那就是不拒絕任何有需要的人。他們這麼做，讓精明的倫敦人十分詫異，認為他們會被一些動機不純的人佔便宜。章伯斯回應說：「上帝會照顧那些尋求幫助的人，我的責任只是給予。」對此，他並沒有要求別人也這麼做。</p>\n<p>這對夫婦效法了我們那位慷慨的創造主。上帝藉著摩西吩咐祂的子民，要以恩慈待人、彼此服事，包括與人分享他們的食物與財物。摩西告訴以色列人，每三年的最後一年，要將他們收成的「十分之一都取出來」，使利未人和「城裡寄居的，並孤兒寡婦，都可以來，吃得飽足」（申命記14章28-29節）。上帝透過祂子民的慷慨給予，照顧那些弱勢群體。</p>\n<p>章伯斯夫婦如此堅定地信靠上帝，使他們能毫不猶豫地樂意給予。他們「學習時常敬畏耶和華」（23節），並在他們「手裡所辦的一切事上」（29節），得到上帝的祝福。</p>\n<p>當我們倚靠上帝，求祂賜下智慧與洞察力，或許我們也會受到激勵而慷慨給予。我們知道，上帝會以豐盛的恩典引導帶領我們，因祂會親自供應孤兒寡婦和寄居者的需要。</p>\n" ,"reflectBody" :"<p><strong>你認為什麼是「給予」？你要如何實踐？<br />上帝如何供應你身心靈的需要？</strong></p>" ,"prayerBody" :"<p><em>慷慨的上帝，我要仰望祢，因祢供應我一切所需，<br />我知道祢是一切美善事物的源頭，我要敬拜祢。\r\n</em></p>" ,"insightsBody" :"<p>聖經清楚指出，上帝一直慷慨地對待我們，祂也要我們慷慨待人（申命記14章29節）。而上帝以最終極的方式展現祂的慷慨，就是將祂的兒子賜給我們。在腓立比書2章，保羅闡述耶穌「放棄了自己神聖的特權，取了奴僕卑微的身分，降生為人」（7節，新普及譯本），而且「為順服上帝而自甘卑微，又像罪犯那樣死在十字架上」（8節，同上）。我們所擁有的一切，都來自上帝這位慷慨的創造主。祂會幫助我們以慷慨待人來回應祂慷慨的供應。</p>" ,"relatedContent" :[] ,"bibleInAYearEntries" :[ {"bibleVerseText" :"歷代志下15-16章;約翰福音12章27-50節" ,"bibleVerseUrl" :"https://www.biblegateway.com/passage/?search=%E6%AD%B7%E4%BB%A3%E5%BF%97%E4%B8%8B+15-16%3B%E7%B4%84%E7%BF%B0%E7%A6%8F%E9%9F%B3+12%3A27-50&version=CUVMPT "}] ,"hideInlineContentAfterDevotionalFromWebsite" :false ,"inlineContentAfterDevoContent" :null ,"fullWidthContent" :null ,"heroTitle" :"慷慨給予" ,"heroContent" : {"displayOption" :null ,"tag" :null ,"model" : {"title" :"慷慨給予" ,"summary" :"你要將⋯⋯十分之一都取出來，⋯⋯你城裡寄居的，並孤兒寡婦，都可以來，吃得飽足。—申命記14章28-29節" ,"link" : {"ariaLabel" :"申命記14章23-29節" ,"text" :"申命記14章23-29節" ,"title" :"申命記14章23-29節" ,"href" :"https://www.biblegateway.com/passage/?search=%E7%94%B3%E5%91%BD%E8%A8%9814:23-29&version=CUVMPT" ,"target" :"Open in a new tab or window" ,"isExternal" :tru e} ,"buttonStyle" :"text-arrow" ,"textColor" :"light" ,"author" : {"summary" :"潘艾梅（Amy Boucher Pye）是一位作家、編輯兼演講者。她經營了一家讀書俱樂部，\u2029也曾寫了一本關於在英國尋找自我的書籍。現與家人居住於英國。\u2029" ,"name" :"潘艾梅" ,"title" :null ,"image" : {"imageType" :"Image" ,"imageAlt" :"" ,"aspectRatio" :null ,"url" :"/globalassets/global/authors/amyboucherpye.jpg "} ,"link" : {"ariaLabel" :"" ,"text" :"Amy Boucher Pye" ,"title" :"" ,"href" :"/tc/authors/Amy-Boucher-Pye" ,"target" :"" ,"isExternal" :fals e }} ,"backgroundImage" : {"imageType" :"Image" ,"imageAlt" :"odb20
